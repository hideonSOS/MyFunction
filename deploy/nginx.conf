upstream django {
    server 127.0.0.1:8000 fail_timeout=0;
}

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name _;

    ssl_certificate /etc/nginx/ssl/myfunction.crt;
    ssl_certificate_key /etc/nginx/ssl/myfunction.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    access_log /var/log/nginx/myfunction_access.log;
    error_log /var/log/nginx/myfunction_error.log;

    location /static/ {
        alias /srv/MyFunction/staticfiles/;
    }

    location /media/ {
        alias /srv/MyFunction/media/;
    }

    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
