{% load static %}
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SCHEDULE // LOGIN</title>
  <link rel="icon" href="data:,">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #060e1a;
      color: #00e5ff;
      font-family: 'Courier New', monospace;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 360px;
      border: 1px solid #00e5ff44;
      border-radius: 8px;
      padding: 40px 28px 36px;
      background: #0d1526;
      box-shadow: 0 0 40px rgba(0, 229, 255, 0.08);
    }

    .logo-main {
      font-size: 24px;
      letter-spacing: 6px;
      text-align: center;
      text-shadow: 0 0 20px #00e5ff;
      margin-bottom: 4px;
    }

    .logo-sub {
      font-size: 10px;
      letter-spacing: 3px;
      text-align: center;
      color: #00e5ff66;
      margin-bottom: 36px;
    }

    label {
      display: block;
      font-size: 11px;
      letter-spacing: 2px;
      color: #7fffd4;
      margin-bottom: 8px;
    }

    input[type="password"] {
      width: 100%;
      padding: 14px 16px;
      background: #071020;
      border: 1px solid #00e5ff44;
      border-radius: 4px;
      color: #00e5ff;
      font-family: 'Courier New', monospace;
      font-size: 20px;
      letter-spacing: 4px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
    }

    input[type="password"]:focus {
      border-color: #00e5ff;
      box-shadow: 0 0 12px rgba(0, 229, 255, 0.2);
    }

    .error-msg {
      margin-top: 10px;
      font-size: 11px;
      color: #ff6060;
      letter-spacing: 1px;
      min-height: 16px;
    }

    button[type="submit"] {
      margin-top: 24px;
      width: 100%;
      padding: 16px;
      background: #071020;
      border: 1px solid #00e5ff;
      border-radius: 4px;
      color: #00e5ff;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      letter-spacing: 3px;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
    }

    button[type="submit"]:hover,
    button[type="submit"]:active {
      background: #112244;
      box-shadow: 0 0 16px rgba(0, 229, 255, 0.3);
    }

    .footer {
      margin-top: 28px;
      text-align: center;
      font-size: 10px;
      color: #00e5ff33;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-main">MY<span style="color:#7fffd4">//</span>FUNC</div>
    <div class="logo-sub">SCHEDULE MANAGER</div>

    <form method="post" action="{% url 'nitei:login' %}">
      {% csrf_token %}
      <label for="pw">PASSWORD</label>
      <input type="password" id="pw" name="password" autocomplete="current-password" autofocus>
      <div class="error-msg">
        {% if error %}● パスワードが違います{% endif %}
      </div>
      <button type="submit">ENTER ▶</button>
    </form>

    <div class="footer">INTEGRATED WORKFLOW SYS</div>
  </div>
</body>
</html>
